<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUXORA | Exclusive Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0f0f0f;
            --cream: #fcfcfc;
            --glass: rgba(255, 255, 255, 0.8);
            --transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            background: radial-gradient(circle at top right, #fffcf5 0%, #f7f7f7 100%);
            color: var(--dark); 
            overflow-x: hidden; 
            min-height: 100vh;
        }

        /* هيدر عصري عائم */
        header { 
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px);
            padding: 15px 8%; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            transition: var(--transition);
        }

        .logo { 
            font-family: 'Cinzel', serif;
            font-size: 28px; font-weight: 900; 
            color: var(--dark); letter-spacing: 6px;
            background: linear-gradient(45deg, #000, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .cart-trigger {
            cursor: pointer; position: relative;
            background: var(--dark); padding: 10px; border-radius: 50%;
            transition: var(--transition);
        }
        .cart-trigger:hover { transform: scale(1.1) rotate(-5deg); background: var(--gold); }

        .cart-icon-svg { width: 22px; height: 22px; stroke: #fff; fill: none; stroke-width: 2; }

        #cart-count { 
            background: var(--gold); color: #fff; font-size: 10px;
            width: 20px; height: 20px; display: flex; align-items: center;
            justify-content: center; border-radius: 50%; position: absolute;
            top: -5px; right: -5px; font-weight: 800; border: 2px solid #fff;
        }

        /* شبكة عرض المنتجات */
        main { 
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 25px; padding: 120px 15px 60px; 
            max-width: 1300px; margin: 0 auto;
        }

        @media (min-width: 768px) {
            main { grid-template-columns: repeat(3, 1fr); gap: 50px; padding-top: 150px; }
        }

        /* كرت المنتج بتصميم "نيو-بورتيف" */
        .product-card { 
            background: transparent; position: relative;
            transition: var(--transition); overflow: hidden;
        }

        .product-image-container {
            position: relative; overflow: hidden; border-radius: 2px;
            aspect-ratio: 3/4;
        }

        .product-card img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 1.5s ease;
        }

        .product-card:hover img { transform: scale(1.1); }

        .product-card::after {
            content: "عرض التفاصيل";
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -20%);
            color: #fff; font-size: 14px; letter-spacing: 2px;
            opacity: 0; transition: var(--transition); z-index: 2;
        }

        .product-card:hover::after { opacity: 1; transform: translate(-50%, -50%); }

        .product-card:hover .product-image-container::before {
            content: ""; position: absolute; inset: 0;
            background: rgba(0,0,0,0.4); z-index: 1;
        }

        .product-info { padding: 20px 5px; text-align: center; }
        .product-card h3 { 
            font-size: 0.95rem; color: #1a1a1a; margin-bottom: 10px;
            font-weight: 400; text-transform: uppercase; letter-spacing: 1px;
        }
        .product-card .price { 
            color: var(--gold); font-weight: 700; font-size: 1.1rem;
            font-family: 'Cinzel', serif;
        }

        /* المودال - نافذة التفاصيل */
        .modal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(255, 255, 255, 0.95); z-index: 2000; 
            justify-content: center; align-items: center; 
            backdrop-filter: blur(15px); animation: fadeIn 0.4s ease;
        }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-content { 
            background: white; width: 95%; max-width: 900px; 
            display: flex; flex-wrap: wrap; position: relative;
            box-shadow: 0 50px 100px rgba(0,0,0,0.1);
        }
        
        .modal-img { flex: 1.2; min-width: 300px; height: 550px; object-fit: cover; }
        .modal-info { flex: 1; padding: 50px; min-width: 300px; background: white; }
        
        .modal-info h2 { font-family: 'Cinzel', serif; font-size: 2rem; margin-bottom: 20px; line-height: 1.2; }
        .modal-info p { color: #777; font-size: 1rem; line-height: 1.8; margin-bottom: 30px; }

        .add-btn { 
            background: var(--dark); color: #fff; border: none; 
            padding: 20px; cursor: pointer; width: 100%; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 3px; transition: var(--transition);
        }
        .add-btn:hover { background: var(--gold); letter-spacing: 5px; }

        /* سايدبار الحقيبة */
        .sidebar { 
            position: fixed; top: 0; left: -100%; width: 400px; height: 100vh; 
            background: white; z-index: 3000; padding: 60px 40px; 
            transition: var(--transition); border-right: 1px solid #eee;
        }
        .sidebar.active { left: 0; }
        @media (max-width: 767px) { .sidebar { width: 100%; } }

        .whatsapp-btn { 
            background: var(--dark); color: #fff; border: none; 
            padding: 22px; cursor: pointer; width: 100%; font-weight: bold; 
            margin-top: 30px; letter-spacing: 2px; text-transform: uppercase;
        }

        #toast { 
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%); 
            background: var(--dark); color: var(--gold); padding: 15px 40px; 
            font-size: 12px; letter-spacing: 2px; opacity: 0; transition: var(--transition); z-index: 4000;
            border-radius: 40px;
        }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="logo">LUXORA</div>
        <div class="cart-trigger" onclick="toggleCart()">
            <svg class="cart-icon-svg" viewBox="0 0 24 24">
                <path d="M5 5h2l2 12h10l2-8H9" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="10" cy="20" r="1" fill="currentColor"/>
                <circle cx="17" cy="20" r="1" fill="currentColor"/>
            </svg>
            <span id="cart-count">0</span>
        </div>
    </header>

    <main id="products-container"></main>

    <div id="toast">أُضيف إلى مجموعتك المختارة</div>

    <div id="product-modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div onclick="closeModal()" style="position: absolute; top: 20px; left: 20px; cursor: pointer; color: #000; font-size: 24px; z-index: 5;">✕</div>
            <img id="modal-image" src="" class="modal-img">
            <div class="modal-info">
                <h2 id="modal-title"></h2>
                <div id="modal-price" style="color: var(--gold); font-size: 1.8rem; margin-bottom: 20px; font-family: 'Cinzel';"></div>
                <p id="modal-description"></p>
                <div style="margin-bottom: 30px;">
                    <label style="font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 2px;">الكمية</label>
                    <input type="number" id="product-qty" value="1" min="1" style="width: 100%; padding: 15px; border: none; border-bottom: 1px solid #eee; font-size: 1.2rem; outline: none;">
                </div>
                <button id="modal-add-btn" class="add-btn">تأكيد الحجز</button>
            </div>
        </div>
    </div>

    <div id="cart-sidebar" class="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px;">
            <h3 style="font-family: 'Cinzel'; font-size: 1.8rem; letter-spacing: 3px;">الحقيبة</h3>
            <span style="cursor: pointer; font-size: 28px;" onclick="toggleCart()">✕</span>
        </div>
        <div id="cart-items" style="max-height: 55vh; overflow-y: auto;"></div>
        <div id="cart-total" style="margin-top: 40px; border-top: 1px solid #eee; padding-top: 30px; text-align: center; font-family: 'Cinzel'; font-size: 1.8rem; color: var(--gold);"></div>
        <button class="whatsapp-btn" onclick="sendWhatsApp()">إرسال عبر الواتساب</button>
    </div>

    <script>
        const products = [
            { id: 1, name: "عقد الزمرد الملكي", price: 3400, description: "صياغة يدوية معقدة تجمع بين الزمرد الصافي والذهب عيار 21.", img: "https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=800" },
            { id: 2, name: "خاتم الألماس الهندسي", price: 1850, description: "خاتم عصري يبرز بريق الألماس في زوايا هندسية مثالية.", img: "https://images.unsplash.com/photo-1605100804763-247f67b3557e?w=800" },
            { id: 3, name: "سوار الكريستال السويسري", price: 920, description: "لمسة من الأناقة اليومية ببريق الكريستال الجبلي النقي.", img: "https://images.unsplash.com/photo-1611591437281-460bfbe1220a?w=800" },
            { id: 4, name: "ساعة ليمتد إيديشين", price: 5200, description: "دقة متناهية وفخامة تليق بالمعصم، بطلاء ذهبي ثقيل.", img: "https://images.unsplash.com/photo-1772949400376-5965cc2256ea?q=80&w=870&auto=format&fit=crop" },
            { id: 5, name: "خاتم الياقوت القرمزي", price: 2100, description: "حجر ياقوت نابض بالحياة محاط بهالة من الأحجار الصغيرة.", img: "https://media.istockphoto.com/id/2077222877/fr/photo/bague-bijoux-pierres-pr%C3%A9cieuses.webp?a=1&b=1&s=612x612&w=0&k=20&c=OUIgGMG3OGlm4MnWHh3HnHY7NNypX-WglWqKZcDc5CY=" },
            { id: 6, name: "خاتم فضة 925 الملكي", price: 7000, description: "تصميم رجالي كلاسيكي بلمسة يدوية من الفضة الإسترلينية.", img: "https://fathyibrahim.com/cdn/shop/files/MR00-3S-8-1_1000x.jpg?v=1742217351" },
        ];

        let cart = JSON.parse(localStorage.getItem('luxora_pro_cart')) || [];

        function displayProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = products.map(p => `
                <div class="product-card" onclick="openModal(${p.id})">
                    <div class="product-image-container">
                        <img src="${p.img}">
                    </div>
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <div class="price">${p.price.toLocaleString()} درهم</div>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id) {
            const p = products.find(prod => prod.id === id);
            document.getElementById('modal-title').innerText = p.name;
            document.getElementById('modal-price').innerText = p.price.toLocaleString() + " درهم";
            document.getElementById('modal-description').innerText = p.description;
            document.getElementById('modal-image').src = p.img;
            document.getElementById('product-qty').value = 1;
            document.getElementById('modal-add-btn').onclick = () => addToCart(p, parseInt(document.getElementById('product-qty').value));
            document.getElementById('product-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('product-modal').style.display = 'none'; }

        function addToCart(product, qty) {
            cart.push({ ...product, qty, cartId: Date.now() });
            localStorage.setItem('luxora_pro_cart', JSON.stringify(cart));
            updateCartUI();
            closeModal();
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 3000);
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const container = document.getElementById('cart-items');
            let total = 0;
            container.innerHTML = cart.map(item => {
                total += (item.price * item.qty);
                return `<div style="margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #f5f5f5; display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <strong style="font-size: 14px; color: #000;">${item.name}</strong><br>
                        <small style="color: var(--gold)">${item.qty} × ${item.price.toLocaleString()} درهم</small>
                    </div>
                    <button onclick="removeFromCart(${item.cartId})" style="border:none; color:#ddd; background:none; cursor:pointer; font-size: 18px;">✕</button>
                </div>`;
            }).join('');
            document.getElementById('cart-total').innerText = total.toLocaleString() + " درهم";
        }

        function removeFromCart(cartId) {
            cart = cart.filter(item => item.cartId !== cartId);
            localStorage.setItem('luxora_pro_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('active'); }

        function sendWhatsApp() {
            if (cart.length === 0) return;
            const phone = "212621445495";
            let msg = "Luxury Order from LUXORA:\n\n" + cart.map(i => `• ${i.name} (Qty: ${i.qty})`).join('\n');
            msg += `\n\nTotal Value: ${document.getElementById('cart-total').innerText}`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        window.onload = () => { displayProducts(); updateCartUI(); };
    </script>
</body>
</html>
