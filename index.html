<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUXORA | Exclusive Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #c5a059;
            --dark: #0a0a0a;
            --cream: #fdfdfd;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
        }

        /* الأساسيات */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            background-color: var(--cream);
            color: var(--dark); 
            overflow-x: hidden; 
        }

        /* --- 1. شاشة التحميل (Loader) --- */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .loader-logo {
            font-family: 'Cinzel', serif;
            font-size: 40px;
            color: var(--gold);
            letter-spacing: 10px;
            animation: pulse 2s infinite ease-in-out;
            text-shadow: 0 0 20px rgba(197, 160, 89, 0.4);
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* --- 2. شاشة اختيار القسم (Entry Screen) --- */
        #entry-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            z-index: 9000;
            background: var(--dark);
            transition: transform 0.8s cubic-bezier(0.87, 0, 0.13, 1);
        }
        .selection-half {
            flex: 1;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .selection-half img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
            transition: 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            filter: grayscale(100%);
        }
        .selection-half:hover img {
            transform: scale(1.1);
            opacity: 0.7;
            filter: grayscale(0%);
        }
        .selection-half h2 {
            position: relative;
            z-index: 10;
            color: white;
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            letter-spacing: 5px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.6);
            border-bottom: 2px solid var(--gold);
            padding: 10px 30px;
            transition: 0.4s;
        }
        .selection-half:hover h2 {
            letter-spacing: 8px;
            color: var(--gold);
        }
        .selection-half::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.8));
        }

        /* --- 3. الهيدر (Header) --- */
        header { 
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(10px);
            padding: 15px 8%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--gold);
        }

        .logo { 
            font-family: 'Cinzel', serif;
            font-size: 28px; 
            font-weight: 900; 
            color: var(--gold);
            letter-spacing: 5px;
            text-shadow: 0 0 10px rgba(197, 160, 89, 0.3);
        }

        .cart-trigger {
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            transition: 0.3s;
        }
        .cart-trigger:hover { transform: scale(1.1); }

        .cart-icon-svg {
            width: 28px; height: 28px;
            fill: none; stroke: var(--gold); stroke-width: 1.5;
        }

        #cart-count { 
            background: var(--gold);
            color: var(--dark);
            font-size: 11px;
            width: 20px; height: 20px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; 
            position: absolute; top: -5px; right: -10px;
            font-weight: 800;
            box-shadow: 0 0 10px rgba(197, 160, 89, 0.5);
        }

        /* --- 4. شبكة المنتجات (Products Grid) --- */
        main { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 25px; 
            padding: 50px 15px; 
            max-width: 1300px;
            margin: 0 auto;
        }

        @media (min-width: 768px) {
            main { grid-template-columns: repeat(3, 1fr); gap: 45px; padding: 70px 8%; }
        }

        .product-card { 
            background: white; 
            border: 1px solid #f2f2f2;
            padding: 18px; 
            transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            cursor: pointer;
            text-align: right;
            position: relative;
        }
        .product-card:hover { 
            box-shadow: var(--shadow);
            border-color: var(--gold);
            transform: translateY(-8px);
        }
        
        .product-card img { 
            width: 100%; height: 260px; object-fit: cover; 
            margin-bottom: 20px;
            filter: contrast(105%);
            transition: 0.5s;
        }
        .product-card:hover img { filter: brightness(1.1); }
        
        .product-card h3 { 
            font-size: 0.95rem; 
            color: #333;
            margin-bottom: 10px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .product-card .price { 
            color: var(--gold); 
            font-weight: 700; 
            font-size: 1.2rem;
            font-family: 'Cinzel', serif;
        }

        /* --- 5. المودال (Product Modal) --- */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.92); z-index: 5000; justify-content: center; align-items: center; 
            backdrop-filter: blur(12px); 
        }
        .modal-content { 
            background: white; width: 92%; max-width: 900px; 
            display: flex; flex-wrap: wrap; position: relative; 
            overflow-y: auto; max-height: 90vh;
            border: 1px solid var(--gold);
            animation: modalFade 0.4s ease;
        }
        @keyframes modalFade { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .modal-img { flex: 1.2; min-width: 350px; height: 500px; object-fit: cover; }
        .modal-info { flex: 1; padding: 50px; min-width: 350px; background: white; display: flex; flex-direction: column; justify-content: center; }
        
        @media (max-width: 768px) {
            .modal-img { height: 300px; min-width: 100%; }
            .modal-info { padding: 30px; min-width: 100%; }
        }

        .modal-info h2 { font-family: 'Cinzel', serif; font-size: 1.8rem; margin-bottom: 15px; color: var(--dark); }
        .modal-info p { color: #777; font-size: 1rem; line-height: 1.8; margin-bottom: 30px; }

        .qty-container { margin-bottom: 25px; }
        .qty-container label { font-size: 12px; color: #aaa; text-transform: uppercase; display: block; margin-bottom: 8px; }
        .qty-container input { width: 100%; padding: 12px; border: 1px solid #eee; font-weight: bold; }

        .add-btn { 
            background: var(--dark); color: var(--gold); border: 1px solid var(--gold); 
            padding: 18px; cursor: pointer; width: 100%; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 3px; transition: 0.4s;
        }
        .add-btn:hover { background: var(--gold); color: var(--dark); }

        /* --- 6. الحقيبة الجانبية (Sidebar) --- */
        .sidebar { 
            position: fixed; top: 0; left: -100%; width: 400px; height: 100vh; 
            background: white; z-index: 6000; padding: 50px 30px; 
            transition: 0.6s cubic-bezier(0.77, 0, 0.175, 1); 
            box-shadow: 15px 0 50px rgba(0,0,0,0.15);
            border-right: 3px solid var(--gold);
        }
        .sidebar.active { left: 0; }
        @media (max-width: 767px) { .sidebar { width: 100%; } }

        .cart-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 0; border-bottom: 1px solid #f5f5f5;
        }
        .cart-item-info strong { display: block; font-size: 14px; margin-bottom: 5px; }
        .cart-item-info span { color: var(--gold); font-family: 'Cinzel'; font-size: 13px; }
        .remove-item { cursor: pointer; color: #ccc; font-size: 18px; transition: 0.3s; }
        .remove-item:hover { color: #ff4444; }

        .whatsapp-btn { 
            background: var(--dark); color: var(--gold); border: 1px solid var(--gold); 
            padding: 20px; cursor: pointer; width: 100%; font-weight: bold; 
            margin-top: 40px; letter-spacing: 2px; text-transform: uppercase;
        }

        /* --- 7. التنبيه (Toast) --- */
        #toast { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); 
            background: var(--gold); color: var(--dark); padding: 15px 40px; 
            font-weight: 800; opacity: 0; transition: 0.6s; z-index: 9999;
            box-shadow: 0 10px 30px rgba(197, 160, 89, 0.4);
        }
    </style>
</head>
<body>

    <div id="loader"><div class="loader-logo">LUXORA</div></div>

    <div id="entry-screen">
        <div class="selection-half" onclick="enterStore('men')">
            <img src="https://images.unsplash.com/photo-1617137984095-74e4e5e3613f?w=800" alt="Men">
            <h2>GENTS</h2>
        </div>
        <div class="selection-half" onclick="enterStore('women')">
            <img src="https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?w=800" alt="Women">
            <h2>LADIES</h2>
        </div>
    </div>

    <header>
        <div class="logo">LUXORA</div>
        <div class="cart-trigger" onclick="toggleCart()">
            <svg class="cart-icon-svg" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
            <span id="cart-count">0</span>
        </div>
    </header>

    <main id="products-container"></main>

    <div id="toast">أُضيف إلى مجموعتك المختارة</div>

    <div id="product-modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div onclick="closeModal()" style="position: absolute; top: 20px; left: 20px; z-index: 100; cursor: pointer; color: var(--gold); font-size: 24px; background: white; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; box-shadow: 0 0 15px rgba(0,0,0,0.1);">✕</div>
            <img id="modal-image" src="" class="modal-img">
            <div class="modal-info">
                <h2 id="modal-title"></h2>
                <p id="modal-price"></p>
                <p id="modal-description"></p>
                <div class="qty-container">
                    <label>الكمية المطلوبة</label>
                    <input type="number" id="product-qty" value="1" min="1">
                </div>
                <button id="modal-add-btn" class="add-btn">أضف للحقيبة الملكية</button>
            </div>
        </div>
    </div>

    <div id="cart-sidebar" class="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid var(--gold); padding-bottom: 15px;">
            <h3 style="font-family: 'Cinzel'; color: var(--gold); letter-spacing: 3px; font-size: 22px;">THE BAG</h3>
            <span style="cursor: pointer; font-size: 28px;" onclick="toggleCart()">✕</span>
        </div>
        <div id="cart-items" style="max-height: 60vh; overflow-y: auto;"></div>
        <div id="cart-total" style="margin-top: 30px; font-weight: bold; border-top: 2px solid #f9f9f9; padding-top: 25px; text-align: center; font-family: 'Cinzel'; font-size: 1.5rem; color: var(--dark);"></div>
        <button class="whatsapp-btn" onclick="sendWhatsApp()">تأكيد الطلب عبر واتساب</button>
    </div>

    <script>
        const allProducts = [
            // قسم النساء
            { id: 1, type: 'women', name: "عقد الزمرد الملكي", price: 3400, description: "قطعة نادرة من الزمرد الكولومبي محاطة بإطار من الذهب عيار 18 قيراط، صُممت لتبرز أناقتك في المناسبات الكبرى.", img: "https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=600" },
            { id: 2, type: 'women', name: "خاتم الألماس الهندسي", price: 1850, description: "تصميم عصري يجمع بين البساطة والفخامة، مرصع بقطع الألماس الصغيرة ذات النقاء العالي.", img: "https://images.unsplash.com/photo-1605100804763-247f67b3557e?w=600" },
            { id: 3, type: 'women', name: "سوار الكريستال الناعم", price: 920, description: "سوار رقيق يناسب الاستخدام اليومي، يعكس الضوء بشكل ساحر مع كل حركة لمعصمك.", img: "https://images.unsplash.com/photo-1611591437281-460bfbe1220a?w=600" },
            { id: 7, type: 'women', name: "أقراط الياقوت الأزرق", price: 1200, description: "أقراط متدلية من الفضة المرصعة بالياقوت الأزرق العميق.", img: "https://images.unsplash.com/photo-1630019852942-f89202989a59?w=600" },
            
            // قسم الرجال
            { id: 4, type: 'men', name: "ساعة ليمتد إيديشين Gold", price: 5200, description: "ساعة ميكانيكية بطلاء ذهبي مقاوم للخدش، تعبر عن الشخصية القيادية والذوق الرفيع.", img: "https://images.unsplash.com/photo-1772949400376-5965cc2256ea?q=80&w=870" },
            { id: 5, type: 'men', name: "خاتم الياقوت القرمزي", price: 2100, description: "خاتم رجالي ثقيل بحجر ياقوت أحمر طبيعي، منحوت يدوياً ليناسب أصحاب التميز.", img: "https://media.istockphoto.com/id/2077222877/fr/photo/bague-bijoux-pierres-pr%C3%A9cieuses.webp?a=1&b=1&s=612x612&w=0&k=20&c=OUIgGMG3OGlm4MnWHh3HnHY7NNypX-WglWqKZcDc5CY=" },
            { id: 6, type: 'men', name: "خاتم فضة 925 نقي", price: 7000, description: "خاتم من الفضة الإسترلينية النقية بتصميم هندسي معقد يجمع بين العراقة والحداثة.", img: "https://fathyibrahim.com/cdn/shop/files/MR00-3S-8-1_1000x.jpg?v=1742217351" },
            { id: 8, type: 'men', name: "ساعة الستانلس الكلاسيكية", price: 4100, description: "ساعة فاخرة بهيكل من الفولاذ المقاوم للصدأ وميناء أسود ملكي.", img: "https://images.unsplash.com/photo-1524592094714-0f0654e20314?w=600" }
        ];

        let cart = JSON.parse(localStorage.getItem('luxora_cart')) || [];

        function enterStore(category) {
            const filtered = allProducts.filter(p => p.type === category);
            displayProducts(filtered);
            document.getElementById('entry-screen').style.transform = 'translateY(-100%)';
        }

        function displayProducts(products) {
            const container = document.getElementById('products-container');
            container.innerHTML = products.map(p => `
                <div class="product-card" onclick="openModal(${p.id})">
                    <img src="${p.img}">
                    <h3>${p.name}</h3>
                    <div class="price">${p.price.toLocaleString()} درهم</div>
                </div>
            `).join('');
        }

        function openModal(id) {
            const p = allProducts.find(prod => prod.id === id);
            document.getElementById('modal-title').innerText = p.name;
            document.getElementById('modal-price').innerText = p.price.toLocaleString() + " درهم";
            document.getElementById('modal-description').innerText = p.description;
            document.getElementById('modal-image').src = p.img;
            document.getElementById('product-qty').value = 1;
            document.getElementById('modal-add-btn').onclick = () => addToCart(p, parseInt(document.getElementById('product-qty').value));
            document.getElementById('product-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('product-modal').style.display = 'none'; }

        function addToCart(product, qty) {
            cart.push({ ...product, qty, cartId: Date.now() });
            localStorage.setItem('luxora_cart', JSON.stringify(cart));
            updateCartUI();
            closeModal();
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2500);
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const container = document.getElementById('cart-items');
            let total = 0;
            container.innerHTML = cart.map(item => {
                total += (item.price * item.qty);
                return `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <strong>${item.name}</strong>
                            <span>${item.qty} × ${item.price.toLocaleString()} درهم</span>
                        </div>
                        <div class="remove-item" onclick="removeFromCart(${item.cartId})">✕</div>
                    </div>
                `;
            }).join('');
            document.getElementById('cart-total').innerText = "الإجمالي: " + total.toLocaleString() + " درهم";
        }

        function removeFromCart(cartId) {
            cart = cart.filter(item => item.cartId !== cartId);
            localStorage.setItem('luxora_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('active'); }

        function sendWhatsApp() {
            if (cart.length === 0) return;
            const phone = "212621445495";
            let msg = "*طلب جديد من LUXORA Boutique*\n\n";
            msg += cart.map(i => `• ${i.name} (العدد: ${i.qty})`).join('\n');
            msg += `\n\n*القيمة الإجمالية:* ${document.getElementById('cart-total').innerText}`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        window.onload = () => {
            updateCartUI();
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.visibility = 'hidden', 800);
            }, 1500);
        };
    </script>
</body>
</html>
